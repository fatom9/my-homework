<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatima Abdulsamad | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000; /* Deep Black Background */
            overflow: hidden;
        }

        /* Modern Container with Pink Glow */
        .container {
            text-align: center;
            padding: 70px 50px;
            background: #ffffff; /* Clean White Card */
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(255, 105, 180, 0.2); /* Soft Pink Shadow */
            position: relative;
            animation: slideUp 1.2s ease-out;
            max-width: 500px;
            width: 90%;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: #ff2d75; /* Hot Pink Accent Line */
            border-radius: 20px 20px 0 0;
        }

        .welcome-text {
            font-size: 0.8rem;
            color: #ff2d75; /* Bold Pink */
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            display: block;
            font-weight: 600;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            color: #1a1a1a; /* Dark Black/Grey */
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .line {
            width: 40px;
            height: 5px;
            background: #1a1a1a;
            margin: 20px auto;
        }

        p {
            color: #666;
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.6;
        }

        .btn {
            margin-top: 30px;
            padding: 12px 35px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            display: inline-block;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            border: 2px solid #1a1a1a;
        }

        .btn:hover {
            background: transparent;
            color: #ff2d75;
            border-color: #ff2d75;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .container { padding: 50px 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="welcome-text">Hello, I am</span>
        <h1>Fatima Abdulsamad</h1>
        <div class="line"></div>
        <p>Creative Web Designer & Front-end Developer focused on crafting beautiful digital experiences.</p>
        <a href="#" class="btn">View My Work</a>
    </div>

</body>
</html>
