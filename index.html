<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاطمة عبدالصمد | الصفحة الشخصية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* خلفية متدرجة بألوان مريحة وفخمة */
            background: linear-gradient(45deg, #0f2027, #203a43, #2c5364);
            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
            padding: 50px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); /* تأثير الزجاج */
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #bdc3c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .dev-tag {
            font-size: 1.2rem;
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: block;
        }

        .line {
            width: 50px;
            height: 4px;
            background: #00d2ff;
            margin: 20px auto;
            border-radius: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* لمسة بسيطة للموبايل */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .container { width: 90%; padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="dev-tag">مرحباً بكم في موقع</span>
        <h1>فاطمة عبدالصمد</h1>
        <div class="line"></div>
        <p>مصممة ومطورة واجهات ويب طموحة</p>
    </div>

</body>
</html>
